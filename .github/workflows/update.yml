name: Daily rental update

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily ≈ 6–7 AM Pacific
  workflow_dispatch: {}      # adds a manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape listings
        run: python scrape.py

      - name: Commit updated data
        run: |
          git config user.name "rental-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json geocache.json
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            SUM=$(cat .run_summary.txt 2>/dev/null || echo "")
            DATE=$(date -u +%Y-%m-%d)
            if [ -n "$SUM" ]; then
              git commit -m "Daily update $DATE: $SUM"
            else
              git commit -m "Daily update: $DATE"
            fi
            git push
          fi
